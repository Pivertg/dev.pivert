<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Devpivert</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07060d; --surface: #0e0c17; --surface2: #15121f; --surface3: #1c1828;
      --border: rgba(255,255,255,0.07); --border-h: rgba(255,255,255,0.13);
      --accent: #7c6aff; --web: #00d4aa; --discord: #5865F2;
      --text: #ede8ff; --text-muted: #6b6485; --text-dim: #9d97b8;
      --danger: #ff5c7c; --warn: #ffd85c; --ok: #84c77b;
      --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
      --radius: 1.2rem; --radius-sm: 0.7rem;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; min-height: 100vh; }

    /* LOGIN */
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box {
      background: var(--surface); border: 1px solid var(--border-h); border-radius: var(--radius);
      padding: 2.5rem; width: min(400px, 100%); display: flex; flex-direction: column; gap: 1.2rem; text-align: center;
    }
    .login-logo { font-size: 2rem; }
    .login-box h1 { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
    .login-box p  { font-size: 0.85rem; color: var(--text-muted); margin-top: -0.6rem; }
    .inp {
      background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-family: var(--font); font-size: 0.95rem; padding: 0.85rem 1.1rem; outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    .inp:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.95rem; font-weight: 600; padding: 0.85rem; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #6957f0; }
    .login-err { font-size: 0.82rem; color: var(--danger); min-height: 1rem; }

    /* HEADER */
    #admin-screen { display: none; min-height: 100vh; flex-direction: column; }
    .admin-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.85rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-title { font-size: 1rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .admin-nav { display: flex; gap: 0.4rem; flex-wrap: wrap; flex: 1; }
    .filter-btn {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 99px;
      color: var(--text-muted); font-family: var(--font); font-size: 0.78rem; padding: 0.35rem 0.9rem;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem;
    }
    .filter-btn .count {
      background: var(--surface3); border-radius: 99px; font-family: var(--mono);
      font-size: 0.65rem; padding: 0.1rem 0.45rem; color: var(--text-muted);
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active .count { background: rgba(124,106,255,0.2); color: var(--accent); }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; }

    .live-indicator { display: flex; align-items: center; gap: 0.4rem; font-family: var(--mono); font-size: 0.7rem; color: var(--text-muted); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); animation: livePulse 2s ease-in-out infinite; }
    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(132,199,123,0.6); }
      50% { box-shadow: 0 0 0 5px rgba(132,199,123,0); }
    }
    .btn-icon {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-muted); font-size: 1rem; width: 2.2rem; height: 2.2rem;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--border-h); }
    .notif-badge {
      position: absolute; top: -4px; right: -4px; background: var(--danger);
      border-radius: 50%; width: 14px; height: 14px; font-size: 0.55rem;
      align-items: center; justify-content: center; color: #fff;
      font-family: var(--mono); display: none;
    }
    .has-notif .notif-badge { display: flex; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-muted); font-family: var(--font); font-size: 0.78rem;
      padding: 0.35rem 0.9rem; cursor: pointer; transition: color 0.2s;
    }
    .btn-logout:hover { color: var(--text); }

    /* LAYOUT */
    .admin-body { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }

    /* LISTE */
    .requests-panel { width: 360px; flex-shrink: 0; overflow-y: auto; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .stat-card { padding: 0.9rem 0.6rem; text-align: center; border-right: 1px solid var(--border); }
    .stat-card:last-child { border-right: none; }
    .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .stat-label { font-family: var(--mono); font-size: 0.58rem; color: var(--text-muted); letter-spacing: 0.04rem; margin-top: 0.1rem; }

    .notif-banner {
      background: rgba(124,106,255,0.1); border: 1px solid rgba(124,106,255,0.25);
      border-radius: var(--radius-sm); margin: 0.8rem; padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.7rem; font-size: 0.82rem; color: var(--text-dim); flex-shrink: 0;
    }
    .notif-banner span { flex: 1; }
    .btn-allow { background: var(--accent); color: #fff; border: none; border-radius: 99px; font-family: var(--font); font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.85rem; cursor: pointer; white-space: nowrap; }
    .btn-dismiss { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }

    .requests-list { flex: 1; overflow-y: auto; }
    .req-item {
      padding: 0.95rem 1.2rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s; display: flex; flex-direction: column; gap: 0.35rem;
      border-left: 3px solid transparent;
    }
    .req-item:hover { background: var(--surface2); }
    .req-item.active { background: var(--surface2); border-left-color: var(--accent); }
    .req-item.status-new { border-left-color: var(--warn); }
    .req-item.status-new.active { border-left-color: var(--accent); }
    .req-item-top { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .req-item-name { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .req-item-date { font-family: var(--mono); font-size: 0.64rem; color: var(--text-muted); flex-shrink: 0; }
    .req-item-sub { font-family: var(--mono); font-size: 0.71rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* DÉTAIL */
    .detail-panel { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .empty-detail { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 1rem; color: var(--text-muted); text-align: center; }
    .empty-detail .icon { font-size: 3rem; opacity: 0.35; }
    .empty-detail p { font-size: 0.88rem; line-height: 1.6; }

    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
    .detail-title { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-top: 0.4rem; }
    .detail-contact { font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); margin-top: 0.3rem; }
    .detail-date { font-family: var(--mono); font-size: 0.7rem; color: var(--text-muted); margin-top: 0.15rem; }
    .detail-actions { display: flex; gap: 0.5rem; flex-shrink: 0; flex-direction: column; align-items: flex-end; }

    .badge-service {
      font-family: var(--mono); font-size: 0.7rem; padding: 0.28rem 0.8rem;
      border-radius: 99px; border: 1px solid; display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .badge-discord { color: #8b97f8; border-color: rgba(88,101,242,0.4); background: rgba(88,101,242,0.1); }
    .badge-website { color: var(--web); border-color: rgba(0,212,170,0.3); background: rgba(0,212,170,0.08); }

    .status-badge {
      font-family: var(--mono); font-size: 0.7rem; padding: 0.28rem 0.8rem;
      border-radius: 99px; cursor: pointer; transition: all 0.2s; border: 1px solid; white-space: nowrap;
    }
    .status-new  { color: var(--warn); border-color: rgba(255,216,92,0.35); background: rgba(255,216,92,0.1); }
    .status-seen { color: var(--ok);   border-color: rgba(132,199,123,0.3); background: rgba(132,199,123,0.08); }
    .status-done { color: var(--text-muted); border-color: var(--border); background: transparent; }

    .detail-section { display: flex; flex-direction: column; gap: 0.6rem; }
    .detail-section-title { font-family: var(--mono); font-size: 0.63rem; color: var(--text-muted); letter-spacing: 0.08rem; text-transform: uppercase; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 0.7rem; }
    .detail-field { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.75rem 1rem; border: 1px solid var(--border); }
    .detail-field-label { font-family: var(--mono); font-size: 0.6rem; color: var(--text-muted); margin-bottom: 0.3rem; letter-spacing: 0.05rem; }
    .detail-field-value { font-size: 0.87rem; color: var(--text-dim); line-height: 1.5; }
    .detail-id { font-family: var(--mono); font-size: 0.68rem; word-break: break-all; }

    .tags-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag { font-family: var(--mono); font-size: 0.7rem; padding: 0.25rem 0.7rem; border-radius: 99px; border: 1px solid var(--border); color: var(--text-dim); background: var(--surface2); }

    .detail-desc {
      background: var(--surface2); border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm); padding: 1rem 1.2rem;
      font-size: 0.9rem; color: var(--text); line-height: 1.75; font-style: italic;
      border: 1px solid var(--border); border-left: 3px solid var(--accent);
    }

    .btn-delete {
      background: transparent; border: 1px solid rgba(255,92,124,0.3); border-radius: var(--radius-sm);
      color: rgba(255,92,124,0.7); font-family: var(--font); font-size: 0.78rem;
      padding: 0.4rem 0.9rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(255,92,124,0.1); color: var(--danger); border-color: var(--danger); }

    /* POPUP IN-APP */
    .notif-popup {
      position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999;
      background: var(--surface); border: 1px solid var(--border-h);
      border-radius: var(--radius); padding: 1rem 1.2rem; width: 290px;
      display: flex; flex-direction: column; gap: 0.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      transform: translateX(320px); opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      pointer-events: none;
    }
    .notif-popup.show { transform: translateX(0); opacity: 1; pointer-events: all; }
    .notif-popup-top { display: flex; justify-content: space-between; align-items: center; }
    .notif-popup-label { font-family: var(--mono); font-size: 0.63rem; color: var(--accent); letter-spacing: 0.06rem; }
    .notif-popup-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; }
    .notif-popup-title { font-weight: 700; font-size: 0.93rem; color: var(--text); }
    .notif-popup-sub { font-size: 0.78rem; color: var(--text-dim); }
    .notif-popup-btns { display: flex; gap: 0.5rem; margin-top: 0.2rem; }
    .np-btn {
      flex: 1; padding: 0.45rem; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-dim); font-family: var(--font);
      font-size: 0.77rem; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .np-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .np-btn.primary:hover { background: #6957f0; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--border-h); border-radius: 99px;
      padding: 0.7rem 1.8rem; font-size: 0.88rem; color: var(--text); z-index: 9999;
      opacity: 0; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .empty-list { text-align: center; padding: 3rem 1.5rem; color: var(--text-muted); font-size: 0.88rem; }
    .empty-list .icon { font-size: 2rem; margin-bottom: 0.6rem; opacity: 0.4; }

    @media (max-width: 720px) {
      .admin-body { flex-direction: column; height: auto; overflow: visible; }
      .requests-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      .detail-panel { padding: 1.2rem; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌿</div>
    <h1>Devpivert Admin</h1>
    <p>Accès restreint</p>
    <input class="inp" type="password" id="pwdInput" placeholder="Mot de passe…" autocomplete="current-password">
    <div class="login-err" id="loginErr"></div>
    <button class="btn-primary" id="loginBtn">Connexion</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="admin-screen" style="display:none">
  <header class="admin-header">
    <div class="admin-title">🌿 Devpivert</div>
    <nav class="admin-nav" id="filterNav">
      <button class="filter-btn active" data-filter="all">Tout <span class="count" id="cnt-all">0</span></button>
      <button class="filter-btn" data-filter="new">Nouvelles <span class="count" id="cnt-new">0</span></button>
      <button class="filter-btn" data-filter="discord">Discord <span class="count" id="cnt-discord">0</span></button>
      <button class="filter-btn" data-filter="website">Web <span class="count" id="cnt-website">0</span></button>
    </nav>
    <div class="header-actions">
      <div class="live-indicator"><div class="live-dot" id="liveDot"></div><span>live</span></div>
      <button class="btn-icon" id="notifToggle" title="Notifications push">
        🔔<span class="notif-badge" id="notifBadge"></span>
      </button>
      <button class="btn-icon" id="refreshBtn" title="Rafraîchir">↺</button>
      <button class="btn-logout" id="logoutBtn">Déco</button>
    </div>
  </header>

  <div class="admin-body">
    <div class="requests-panel">
      <div class="stats-row" id="statsRow"></div>
      <div class="notif-banner" id="notifBanner" style="display:none">
        <span>🔔 Active les notifs push pour les nouvelles demandes.</span>
        <button class="btn-allow" id="allowNotifBtn">Activer</button>
        <button class="btn-dismiss" id="dismissNotifBtn">✕</button>
      </div>
      <div class="requests-list" id="requestsList"></div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="empty-detail">
        <div class="icon">📋</div>
        <p>Sélectionne une demande<br>pour voir les détails</p>
      </div>
    </div>
  </div>
</div>

<!-- POPUP IN-APP -->
<div class="notif-popup" id="notifPopup">
  <div class="notif-popup-top">
    <span class="notif-popup-label">✦ NOUVELLE DEMANDE</span>
    <button class="notif-popup-close" id="closePopup">✕</button>
  </div>
  <div class="notif-popup-title" id="popupTitle">—</div>
  <div class="notif-popup-sub" id="popupSub">—</div>
  <div class="notif-popup-btns">
    <button class="np-btn primary" id="popupView">Voir →</button>
    <button class="np-btn" id="popupDismiss">Ignorer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════ STATE ══════ */
let token         = sessionStorage.getItem("admin_token") || "";
let allRequests   = [];
let currentFilter = "all";
let selectedId    = null;
let notifGranted  = false;
let pendingNotif  = null;
let lastKnownIds  = new Set(JSON.parse(localStorage.getItem("dp_known_ids") || "[]"));

/* ══════ AUTH ══════ */
document.getElementById("loginBtn").addEventListener("click", tryLogin);
document.getElementById("pwdInput").addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

async function tryLogin() {
  const pwd = document.getElementById("pwdInput").value;
  const res = await fetch("/api/admin/login", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pwd })
  });
  if (res.ok) {
    token = (await res.json()).token;
    sessionStorage.setItem("admin_token", token);
    showDashboard();
  } else {
    document.getElementById("loginErr").textContent = "❌ Mot de passe incorrect";
  }
}

async function checkToken() {
  if (!token) return;
  const res = await fetch("/api/admin/requests", { headers: { Authorization: `Bearer ${token}` } });
  if (res.ok) showDashboard();
  else { token = ""; sessionStorage.removeItem("admin_token"); }
}
checkToken();

document.getElementById("logoutBtn").addEventListener("click", () => {
  token = ""; sessionStorage.removeItem("admin_token");
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
});

async function showDashboard() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("admin-screen").style.display = "flex";
  await loadRequests();
  initNotifications();
}

/* ══════ DONNÉES ══════ */
async function loadRequests(silent = false) {
  try {
    const res = await fetch("/api/admin/requests", { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) return;
    const fresh = await res.json();

    // Détecter nouvelles demandes (seulement après le premier chargement)
    if (allRequests.length > 0) {
      fresh.filter(r => !lastKnownIds.has(r.id)).forEach(r => triggerAlert(r));
    }

    allRequests = fresh;
    lastKnownIds = new Set(allRequests.map(r => r.id));
    localStorage.setItem("dp_known_ids", JSON.stringify([...lastKnownIds]));

    renderStats();
    renderList();
    if (selectedId) renderDetail(selectedId);
    if (!silent) flashLive();
  } catch(e) {}
}

/* ══════ STATS ══════ */
function renderStats() {
  const total = allRequests.length;
  const nNew  = allRequests.filter(r => r.status === "new").length;
  const nDisc = allRequests.filter(r => r.service === "discord").length;
  const nWeb  = allRequests.filter(r => r.service === "website").length;

  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">TOTAL</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${nNew}</div><div class="stat-label">NOUVELLES</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#8b97f8">${nDisc}</div><div class="stat-label">DISCORD</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--web)">${nWeb}</div><div class="stat-label">WEB</div></div>`;

  document.getElementById("cnt-all").textContent     = total;
  document.getElementById("cnt-new").textContent     = nNew;
  document.getElementById("cnt-discord").textContent = nDisc;
  document.getElementById("cnt-website").textContent = nWeb;

  const notifBtn = document.getElementById("notifToggle");
  if (nNew > 0) {
    notifBtn.classList.add("has-notif");
    document.getElementById("notifBadge").textContent = nNew;
  } else {
    notifBtn.classList.remove("has-notif");
  }
}

/* ══════ LISTE ══════ */
function getFiltered() {
  if (currentFilter === "new")     return allRequests.filter(r => r.status === "new");
  if (currentFilter === "discord") return allRequests.filter(r => r.service === "discord");
  if (currentFilter === "website") return allRequests.filter(r => r.service === "website");
  return allRequests;
}

function renderList() {
  const items = getFiltered().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const list  = document.getElementById("requestsList");

  if (!items.length) {
    list.innerHTML = `<div class="empty-list"><div class="icon">📭</div>Aucune demande ici.</div>`;
    return;
  }

  list.innerHTML = items.map(r => `
    <div class="req-item status-${r.status}${selectedId === r.id ? " active" : ""}" data-id="${r.id}">
      <div class="req-item-top">
        <span class="req-item-name">${r.prenom || "—"}</span>
        <span class="req-item-date">${timeAgo(r.created_at)}</span>
      </div>
      <div class="req-item-sub">${r.service === "discord" ? "🤖" : "🌐"} ${r.type || r.service} · ${r.contact || "—"}</div>
    </div>`).join("");

  list.querySelectorAll(".req-item").forEach(el => {
    el.addEventListener("click", () => {
      selectedId = el.dataset.id;
      list.querySelectorAll(".req-item").forEach(e => e.classList.remove("active"));
      el.classList.add("active");
      renderDetail(selectedId);
      // Auto-marquer "vue"
      const r = allRequests.find(x => x.id === selectedId);
      if (r && r.status === "new") setStatus(selectedId, "seen", false);
    });
  });
}

/* ══════ DÉTAIL ══════ */
function renderDetail(id) {
  const r = allRequests.find(x => x.id === id);
  const panel = document.getElementById("detailPanel");
  if (!r) return;

  const sLabels = { new: "🟡 Nouvelle", seen: "🟢 Vue", done: "⚫ Traitée" };
  const sNext   = { new: "seen", seen: "done", done: "new" };

  panel.innerHTML = `
    <div class="detail-header">
      <div>
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;flex-wrap:wrap;">
          <span class="badge-service badge-${r.service}">${r.service === "discord" ? "🤖 Bot Discord" : "🌐 Site Web"}</span>
          <span class="status-badge status-${r.status}" id="statusToggle">${sLabels[r.status]}</span>
        </div>
        <div class="detail-title">${r.prenom || "—"}</div>
        <div class="detail-contact">${r.contact || "—"}</div>
        <div class="detail-date">${new Date(r.created_at).toLocaleString("fr-FR")}</div>
      </div>
      <div class="detail-actions">
        <button class="btn-delete" id="deleteBtn">🗑 Supprimer</button>
      </div>
    </div>

    ${(r.type || r.hebergement) ? `
    <div class="detail-section">
      <div class="detail-section-title">Infos projet</div>
      <div class="detail-grid">
        ${r.type ? `<div class="detail-field"><div class="detail-field-label">TYPE</div><div class="detail-field-value">${r.type}</div></div>` : ""}
        ${r.hebergement ? `<div class="detail-field"><div class="detail-field-label">HÉBERGEMENT</div><div class="detail-field-value">${r.hebergement === "yes" ? "✅ Inclus" : "❌ Autonome"}</div></div>` : ""}
        <div class="detail-field"><div class="detail-field-label">ID DEMANDE</div><div class="detail-field-value detail-id">${r.id}</div></div>
      </div>
    </div>` : ""}

    ${(r.fonctions?.length || r.techno?.length) ? `
    <div class="detail-section">
      <div class="detail-section-title">${r.fonctions?.length ? "Fonctionnalités" : "Technologies"}</div>
      <div class="tags-row">
        ${(r.fonctions?.length ? r.fonctions : r.techno).map(t => `<span class="tag">${t}</span>`).join("")}
      </div>
    </div>` : ""}

    ${r.description ? `
    <div class="detail-section">
      <div class="detail-section-title">Description du projet</div>
      <div class="detail-desc">${r.description}</div>
    </div>` : ""}
  `;

  document.getElementById("statusToggle").addEventListener("click", () => setStatus(r.id, sNext[r.status], true));
  document.getElementById("deleteBtn").addEventListener("click", () => deleteRequest(r.id));
}

/* ══════ ACTIONS ══════ */
async function setStatus(id, next, refresh = true) {
  const res = await fetch(`/api/admin/requests/${id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
    body: JSON.stringify({ status: next })
  });
  if (res.ok) {
    const r = allRequests.find(x => x.id === id);
    if (r) r.status = next;
    renderStats(); renderList();
    if (refresh) renderDetail(id);
    toast(`→ ${{ new:"Nouvelle", seen:"Vue", done:"Traitée" }[next]}`);
  }
}

async function deleteRequest(id) {
  if (!confirm("Supprimer cette demande ?")) return;
  const res = await fetch(`/api/admin/requests/${id}`, {
    method: "DELETE", headers: { Authorization: `Bearer ${token}` }
  });
  if (res.ok) {
    allRequests = allRequests.filter(r => r.id !== id);
    if (selectedId === id) {
      selectedId = null;
      document.getElementById("detailPanel").innerHTML = `<div class="empty-detail"><div class="icon">🗑</div><p>Demande supprimée.</p></div>`;
    }
    renderStats(); renderList();
    toast("🗑 Supprimée");
  }
}

/* ══════ FILTRES ══════ */
document.getElementById("filterNav").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter = btn.dataset.filter;
  renderList();
});

/* ══════ NOTIFICATIONS ══════ */
function initNotifications() {
  if (!("Notification" in window)) return;
  notifGranted = Notification.permission === "granted";

  if (Notification.permission === "default") {
    document.getElementById("notifBanner").style.display = "flex";
  }

  document.getElementById("allowNotifBtn").addEventListener("click", async () => {
    const p = await Notification.requestPermission();
    notifGranted = p === "granted";
    document.getElementById("notifBanner").style.display = "none";
    toast(notifGranted ? "🔔 Notifications activées !" : "❌ Permission refusée.");
  });

  document.getElementById("dismissNotifBtn").addEventListener("click", () => {
    document.getElementById("notifBanner").style.display = "none";
  });

  document.getElementById("notifToggle").addEventListener("click", async () => {
    if (Notification.permission !== "granted") {
      const p = await Notification.requestPermission();
      notifGranted = p === "granted";
      if (notifGranted) { toast("🔔 Activées !"); document.getElementById("notifBanner").style.display = "none"; }
      else toast("❌ Permission refusée.");
    } else {
      toast("🔔 Notifications déjà actives !");
    }
  });
}

function triggerAlert(r) {
  // 1. Popup in-app
  pendingNotif = r.id;
  document.getElementById("popupTitle").textContent = `${r.prenom} · ${r.service === "discord" ? "🤖 Bot Discord" : "🌐 Site Web"}`;
  document.getElementById("popupSub").textContent = r.contact || "";
  const popup = document.getElementById("notifPopup");
  popup.classList.add("show");
  clearTimeout(popup._t);
  popup._t = setTimeout(() => popup.classList.remove("show"), 8000);

  // 2. Notification navigateur
  if (notifGranted) {
    const n = new Notification("🌿 Nouvelle demande — Devpivert", {
      body: `${r.prenom} · ${r.service === "discord" ? "Bot Discord" : "Site Web"}\n${r.contact}`,
      tag: "dp-req", requireInteraction: true,
    });
    n.onclick = () => { window.focus(); selectedId = r.id; renderList(); renderDetail(r.id); n.close(); };
  }

  // 3. Son
  playBeep();
}

document.getElementById("closePopup").addEventListener("click", () => document.getElementById("notifPopup").classList.remove("show"));
document.getElementById("popupDismiss").addEventListener("click", () => document.getElementById("notifPopup").classList.remove("show"));
document.getElementById("popupView").addEventListener("click", () => {
  document.getElementById("notifPopup").classList.remove("show");
  if (pendingNotif) { selectedId = pendingNotif; renderList(); renderDetail(selectedId); }
});

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [440, 554, 659].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = "sine";
      const t = ctx.currentTime + i * 0.13;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.07, t + 0.02);
      g.gain.linearRampToValueAtTime(0, t + 0.18);
      o.start(t); o.stop(t + 0.2);
    });
  } catch(e) {}
}

/* ══════ REFRESH ══════ */
document.getElementById("refreshBtn").addEventListener("click", () => { loadRequests(); toast("↺ Actualisé"); });
setInterval(() => { if (token) loadRequests(true); }, 600000);

function flashLive() {
  const d = document.getElementById("liveDot");
  d.style.background = "#fff";
  setTimeout(() => d.style.background = "", 400);
}

/* ══════ UTILS ══════ */
function timeAgo(iso) {
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return "à l'instant";
  if (m < 60) return `${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h`;
  return `${Math.floor(h / 24)}j`;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}
</script>
